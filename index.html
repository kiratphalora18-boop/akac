<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · </title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f5f0e8;
      --cream: #ede8dc;
      --ink: #1a1410;
      --mauve: #9b7b8c;
      --plum: #5c3d52;
      --blush: #d4a9a0;
      --gold: #c9a84c;
      --border: rgba(26,20,16,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--paper);
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 99; opacity: 0.5;
    }

    /* Soft background orbs */
    .bg-orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(212,169,160,0.18); top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(155,123,140,0.12); bottom: -80px; left: -80px; }
    .orb-3 { width: 200px; height: 200px; background: rgba(201,168,76,0.08); top: 50%; left: 50%; transform: translate(-50%,-50%); }

    /* Card */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      margin: 20px;
      background: white;
      border: 1px solid rgba(26,20,16,0.08);
      border-radius: 24px;
      padding: 48px 40px 40px;
      box-shadow: 0 8px 48px rgba(92,61,82,0.1), 0 2px 0 rgba(255,255,255,0.9) inset;
      animation: cardIn 0.6s cubic-bezier(0.4,0,0.2,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Header */
    .brand {
      text-align: center; margin-bottom: 32px;
    }
    .brand-lock {
      display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 52px; border-radius: 16px;
      background: var(--cream); border: 1px solid var(--border);
      font-size: 22px; margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(92,61,82,0.08);
      animation: lockPulse 3s ease-in-out infinite;
    }
    @keyframes lockPulse {
      0%,100% { box-shadow: 0 2px 12px rgba(92,61,82,0.08); }
      50%      { box-shadow: 0 4px 20px rgba(92,61,82,0.18); }
    }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 400;
      color: var(--plum); letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .brand-name em { font-style: italic; color: var(--mauve); }
    .brand-sub {
      font-size: 11px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--mauve);
      opacity: 0.6;
    }

    /* Divider */
    .divider {
      height: 1px; background: var(--border); margin-bottom: 32px;
    }

    /* PIN dots */
    .pin-display {
      display: flex; justify-content: center; gap: 14px; margin-bottom: 28px;
    }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 1.5px solid rgba(92,61,82,0.25);
      background: transparent;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    .pin-dot.filled {
      background: var(--plum);
      border-color: var(--plum);
      transform: scale(1.15);
      box-shadow: 0 2px 8px rgba(92,61,82,0.3);
    }
    .pin-dot.error {
      border-color: #c62828;
      background: #c62828;
      animation: dotShake 0.4s ease;
    }
    .pin-dot.success {
      border-color: #7a8c75;
      background: #7a8c75;
    }
    @keyframes dotShake {
      0%,100% { transform: translateX(0) scale(1.1); }
      25%      { transform: translateX(-5px) scale(1.1); }
      75%      { transform: translateX(5px) scale(1.1); }
    }

    /* Keypad */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .key {
      aspect-ratio: 1;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 400;
      color: var(--plum);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
      user-select: none;
      box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset;
      position: relative; overflow: hidden;
    }
    .key:hover {
      background: white;
      border-color: rgba(92,61,82,0.2);
      box-shadow: 0 4px 14px rgba(92,61,82,0.1), 0 1px 0 rgba(255,255,255,0.8) inset;
      transform: translateY(-1px);
    }
    .key:active {
      transform: scale(0.94);
      box-shadow: 0 1px 4px rgba(92,61,82,0.08) inset;
    }
    .key.zero { grid-column: 2; }
    .key.delete {
      font-size: 18px; color: var(--mauve);
      grid-column: 3;
    }
    .key.delete:hover { color: #c62828; border-color: rgba(198,40,40,0.2); background: rgba(198,40,40,0.04); }

    /* Ripple */
    .key::after {
      content: '';
      position: absolute; border-radius: 50%;
      background: rgba(92,61,82,0.12);
      width: 0; height: 0;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      transition: width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .key.ripple::after { width: 120px; height: 120px; opacity: 1; }

    /* Status message */
    .status-msg {
      text-align: center; font-size: 11px;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-top: 20px; min-height: 18px;
      transition: all 0.2s;
    }
    .status-msg.error { color: #c62828; animation: msgIn 0.3s ease; }
    .status-msg.success { color: #7a8c75; animation: msgIn 0.3s ease; }
    .status-msg.hint { color: var(--mauve); opacity: 0.55; }
    @keyframes msgIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    /* Back link */
    .back-link {
      display: block; text-align: center;
      margin-top: 28px;
      font-size: 12px; color: var(--mauve);
      text-decoration: none; opacity: 0.5;
      letter-spacing: 0.08em;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    /* Success overlay */
    .success-overlay {
      position: absolute; inset: 0;
      background: white; border-radius: 24px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 10;
    }
    .success-overlay.show { opacity: 1; pointer-events: all; }
    .success-icon { font-size: 40px; animation: successBounce 0.5s cubic-bezier(0.4,0,0.2,1); }
    @keyframes successBounce { 0% { transform: scale(0.5); opacity:0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity:1; } }
    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-style: italic; color: var(--plum);
    }
    .success-sub { font-size: 11px; color: var(--mauve); opacity: 0.6; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Card shake on error */
    @keyframes cardShake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .card.shake { animation: cardShake 0.45s ease; }
  </style>
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="card" id="card">

    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
      <span class="success-icon">✦</span>
      <div class="success-title">Welcome back.</div>
      <div class="success-sub">Redirecting…</div>
    </div>

    <!-- Brand -->
    <div class="brand">
      <div class="brand-lock">🔒</div>
      <div class="brand-name">Access <em>For</em> Bestie Only</div>
      <div class="brand-sub">Admin Access</div>
    </div>

    <div class="divider"></div>

    <!-- PIN dots -->
    <div class="pin-display" id="pinDisplay">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <!-- Keypad -->
    <div class="keypad" id="keypad">
      <button class="key" data-val="1">1</button>
      <button class="key" data-val="2">2</button>
      <button class="key" data-val="3">3</button>
      <button class="key" data-val="4">4</button>
      <button class="key" data-val="5">5</button>
      <button class="key" data-val="6">6</button>
      <button class="key" data-val="7">7</button>
      <button class="key" data-val="8">8</button>
      <button class="key" data-val="9">9</button>
      <button class="key zero" data-val="0">0</button>
      <button class="key delete" data-val="del">⌫</button>
    </div>

    <!-- Status -->
    <div class="status-msg hint" id="statusMsg">Enter your 4-digit code</div>

    <a href="main.html" class="back-link">← Back to site</a>

  </div>

  <script>
    'use strict';

    /* ── SET YOUR PIN HERE ── */
    var CORRECT_PIN = '5555'; /* ← change this to your 4-digit code */

    var pin = '';
    var locked = false;
    var attempts = 0;
    var MAX_ATTEMPTS = 5;
    var LOCKOUT_MS = 30000; /* 30 seconds */

    var dots = [
      document.getElementById('d0'),
      document.getElementById('d1'),
      document.getElementById('d2'),
      document.getElementById('d3')
    ];

    /* ── KEYPAD CLICKS ── */
    document.getElementById('keypad').addEventListener('click', function(e) {
      var key = e.target.closest('.key');
      if (!key || locked) return;

      var val = key.dataset.val;

      /* Ripple effect */
      key.classList.remove('ripple');
      void key.offsetWidth;
      key.classList.add('ripple');
      setTimeout(function() { key.classList.remove('ripple'); }, 300);

      if (val === 'del') {
        if (pin.length > 0) {
          pin = pin.slice(0, -1);
          updateDots();
          setStatus('', 'hint');
        }
      } else if (pin.length < 4) {
        pin += val;
        updateDots();
        if (pin.length === 4) {
          setTimeout(checkPin, 120);
        }
      }
    });

    /* ── KEYBOARD SUPPORT ── */
    document.addEventListener('keydown', function(e) {
      if (locked) return;
      if (e.key >= '0' && e.key <= '9' && pin.length < 4) {
        pin += e.key;
        updateDots();
        if (pin.length === 4) setTimeout(checkPin, 120);
      } else if (e.key === 'Backspace') {
        pin = pin.slice(0, -1);
        updateDots();
        setStatus('', 'hint');
      }
    });

    /* ── UPDATE DOTS ── */
    function updateDots() {
      dots.forEach(function(dot, i) {
        dot.className = 'pin-dot' + (i < pin.length ? ' filled' : '');
      });
    }

    /* ── CHECK PIN ── */
    function checkPin() {
      if (pin === CORRECT_PIN) {
        /* Success */
        dots.forEach(function(dot) { dot.className = 'pin-dot success'; });
        setStatus('Access granted', 'success');
        setTimeout(function() {
          document.getElementById('successOverlay').classList.add('show');
          setTimeout(function() {
            window.location.href = 'main.html';
          }, 1800);
        }, 300);

      } else {
        /* Wrong PIN */
        attempts++;
        dots.forEach(function(dot) { dot.className = 'pin-dot error'; });

        var card = document.getElementById('card');
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');

        if (attempts >= MAX_ATTEMPTS) {
          startLockout();
        } else {
          var remaining = MAX_ATTEMPTS - attempts;
          setStatus(remaining + ' attempt' + (remaining === 1 ? '' : 's') + ' remaining', 'error');
          setTimeout(reset, 700);
        }
      }
    }

    /* ── LOCKOUT ── */
    function startLockout() {
      locked = true;
      var keypad = document.getElementById('keypad');
      keypad.style.opacity = '0.35';
      keypad.style.pointerEvents = 'none';

      var end = Date.now() + LOCKOUT_MS;

      function tick() {
        var left = Math.ceil((end - Date.now()) / 1000);
        if (left <= 0) {
          locked = false; attempts = 0;
          keypad.style.opacity = '';
          keypad.style.pointerEvents = '';
          reset();
          setStatus('Try again', 'hint');
        } else {
          setStatus('Too many attempts — wait ' + left + 's', 'error');
          setTimeout(tick, 1000);
        }
      }
      tick();
    }

    /* ── RESET ── */
    function reset() {
      pin = '';
      updateDots();
      if (!locked) setStatus('Enter your 4-digit code', 'hint');
    }

    /* ── STATUS ── */
    function setStatus(msg, type) {
      var el = document.getElementById('statusMsg');
      el.textContent = msg || 'Enter your 4-digit code';
      el.className = 'status-msg ' + (type || 'hint');
    }
  </script>

</body>
</html>
