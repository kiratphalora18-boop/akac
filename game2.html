<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Cairn</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Inter", sans-serif;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          #cfe0e8 0%,
          #e8ddc8 55%,
          #d4c8a8 100%
        );
      }

      canvas {
        display: block;
        position: fixed;
        inset: 0;
      }

      #ui {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        pointer-events: none;
        z-index: 10;
      }

      #header {
        margin-top: 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }
      h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(26px, 5vw, 36px);
        font-weight: 500;
        font-style: italic;
        color: #3a3530;
      }
      #stone-count {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #5a534a;
        opacity: 0.5;
      }

      #hint {
        position: fixed;
        bottom: 26px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        letter-spacing: 0.05em;
        color: #4a443c;
        opacity: 0.4;
        text-align: center;
        max-width: 340px;
        line-height: 1.5;
        pointer-events: none;
      }

      /* Toast */
      #toast {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        background: rgba(58, 53, 48, 0.88);
        color: #f5f0e4;
        padding: 12px 26px;
        border-radius: 50px;
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 17px;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.4s,
          transform 0.4s;
        z-index: 50;
        white-space: nowrap;
      }
      #toast.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      /* Reset button */
      #reset-btn {
        position: fixed;
        top: 24px;
        right: 24px;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(6px);
        border: none;
        border-radius: 50px;
        padding: 9px 18px;
        font-family: "Inter", sans-serif;
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #4a443c;
        cursor: pointer;
        pointer-events: all;
        opacity: 0.55;
        transition:
          opacity 0.2s,
          background 0.2s;
        z-index: 20;
      }
      #reset-btn:hover {
        opacity: 1;
        background: rgba(255, 255, 255, 0.7);
      }

      /* Held stone indicator (next stone preview) */
      #next-stone-preview {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
        pointer-events: none;
        opacity: 0.7;
        z-index: 15;
      }
      #next-label {
        font-size: 9px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #5a534a;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>

    <div id="ui">
      <div id="header">
        <h1>Cairn</h1>
        <span id="stone-count">0 stones balanced</span>
      </div>
    </div>

    <button id="reset-btn">clear cairn</button>

    <div id="hint">
      Click or tap to drop a stone. Click again to release it where it rests. No
      timer — take all the time you like.
    </div>

    <div id="toast"></div>

    <script>
      // ════════════════════════════════════════════════════════════════
      // SETUP
      // ════════════════════════════════════════════════════════════════
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      let W,
        H,
        DPR = Math.min(window.devicePixelRatio || 1, 2);

      function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      }
      resize();
      window.addEventListener("resize", resize);

      const GROUND_Y = () => H * 0.82;

      // ════════════════════════════════════════════════════════════════
      // PHYSICS — very gentle, slow falling stones that rest & wobble
      // ════════════════════════════════════════════════════════════════
      const GRAVITY = 0.045; // slow fall

      let stones = []; // settled stones {x,y,w,h,rot,color,settled:true}
      let activeStone = null; // currently controlled stone, swinging/falling

      const STONE_PALETTE = [
        { top: "#b8a890", mid: "#9a8a70", bot: "#7a6c56" },
        { top: "#a8a8a0", mid: "#8a8a82", bot: "#6c6c64" },
        { top: "#c8b8a0", mid: "#ab9a80", bot: "#897a62" },
        { top: "#b0a8a8", mid: "#928a8a", bot: "#746c6c" },
        { top: "#c0ac8c", mid: "#a08e6e", bot: "#7e6e54" },
      ];

      function randStoneShape() {
        // Irregular rounded rock polygon
        const w = 46 + Math.random() * 38;
        const h = w * (0.55 + Math.random() * 0.3);
        const n = 7 + Math.floor(Math.random() * 3);
        const pts = [];
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2;
          const rx = (w / 2) * (0.78 + Math.random() * 0.26);
          const ry = (h / 2) * (0.78 + Math.random() * 0.26);
          pts.push({ x: Math.cos(a) * rx, y: Math.sin(a) * ry });
        }
        return { w, h, pts };
      }

      function spawnNewActiveStone() {
        const shape = randStoneShape();
        const color =
          STONE_PALETTE[Math.floor(Math.random() * STONE_PALETTE.length)];
        activeStone = {
          x: W / 2,
          y: H * 0.14,
          vx: 0,
          vy: 0,
          shape,
          color,
          rot: 0,
          rotV: 0,
          state: "hover", // hover -> falling -> settled
          swayT: Math.random() * Math.PI * 2,
          grabbed: false,
        };
      }

      // ════════════════════════════════════════════════════════════════
      // INTERACTION
      // Click 1: stone begins falling from wherever it's hovering (x follows pointer while hovering)
      // Click while falling: nudge it / give tiny horizontal push (gentle control)
      // ════════════════════════════════════════════════════════════════
      let pointerX = W / 2,
        pointerY = H * 0.2;
      let isPointerDown = false;

      function getPointer(e) {
        if (e.touches && e.touches[0])
          return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        return { x: e.clientX, y: e.clientY };
      }

      document.addEventListener("mousemove", (e) => {
        pointerX = e.clientX;
        pointerY = e.clientY;
      });
      document.addEventListener(
        "touchmove",
        (e) => {
          const p = getPointer(e);
          pointerX = p.x;
          pointerY = p.y;
        },
        { passive: true },
      );

      function handlePointerDown(e) {
        const p = getPointer(e);
        if (!activeStone) return;
        if (activeStone.state === "hover") {
          // Release: start falling
          activeStone.state = "falling";
          activeStone.vx = (Math.random() - 0.5) * 0.3;
        } else if (activeStone.state === "falling") {
          // Gentle nudge toward pointer x
          activeStone.vx += (p.x - activeStone.x) * 0.0025;
        }
      }
      canvas.addEventListener("mousedown", handlePointerDown);
      canvas.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          handlePointerDown(e);
        },
        { passive: false },
      );

      // ════════════════════════════════════════════════════════════════
      // Collision: stone resting on ground or on top of another stone
      // We use simplified AABB-ish height test based on shape's max radius
      // ════════════════════════════════════════════════════════════════
      function stoneRadius(stone) {
        let maxR = 0;
        for (const pt of stone.shape.pts) {
          const r = Math.hypot(pt.x, pt.y);
          if (r > maxR) maxR = r;
        }
        return maxR;
      }

      function stoneBottomY(stone) {
        // lowest point considering rotation
        let maxY = -Infinity;
        for (const pt of stone.shape.pts) {
          const rx = pt.x * Math.cos(stone.rot) - pt.y * Math.sin(stone.rot);
          const ry = pt.x * Math.sin(stone.rot) + pt.y * Math.cos(stone.rot);
          if (ry > maxY) maxY = ry;
        }
        return stone.y + maxY;
      }
      function stoneTopY(stone) {
        let minY = Infinity;
        for (const pt of stone.shape.pts) {
          const rx = pt.x * Math.cos(stone.rot) - pt.y * Math.sin(stone.rot);
          const ry = pt.x * Math.sin(stone.rot) + pt.y * Math.cos(stone.rot);
          if (ry < minY) minY = ry;
        }
        return stone.y + minY;
      }
      function stoneWidthAt(stone) {
        let minX = Infinity,
          maxX = -Infinity;
        for (const pt of stone.shape.pts) {
          const rx = pt.x * Math.cos(stone.rot) - pt.y * Math.sin(stone.rot);
          if (rx < minX) minX = rx;
          if (rx > maxX) maxX = rx;
        }
        return { minX: stone.x + minX, maxX: stone.x + maxX };
      }

      function findRestingSpot(stone) {
        // Check against settled stones for support directly below stone.x
        let restY = GROUND_Y();
        let supportFound = null;

        const sw = stoneWidthAt(stone);

        for (const s of stones) {
          const sw2 = stoneWidthAt(s);
          // Overlap horizontally?
          const overlap =
            Math.min(sw.maxX, sw2.maxX) - Math.max(sw.minX, sw2.minX);
          if (overlap > 14) {
            const topOfS = stoneTopY(s);
            if (topOfS < restY && stoneBottomY(stone) >= topOfS - 2) {
              restY = topOfS;
              supportFound = s;
            }
          }
        }
        return { restY, supportFound };
      }

      // ════════════════════════════════════════════════════════════════
      // UPDATE LOOP
      // ════════════════════════════════════════════════════════════════
      let toppleWarning = false;
      let stoneCountEl = document.getElementById("stone-count");

      function updateActiveStone(dt) {
        if (!activeStone) return;

        if (activeStone.state === "hover") {
          // Gentle floating sway, loosely follows pointer x
          activeStone.swayT += 0.02 * dt;
          const targetX = pointerX;
          activeStone.x += (targetX - activeStone.x) * 0.06;
          activeStone.y = H * 0.14 + Math.sin(activeStone.swayT) * 6;
          activeStone.rot = Math.sin(activeStone.swayT * 0.7) * 0.08;
          return;
        }

        if (activeStone.state === "falling") {
          activeStone.vy += GRAVITY * dt;
          activeStone.vy = Math.min(activeStone.vy, 4.2); // terminal velocity, slow
          activeStone.vx *= 0.985;
          activeStone.x += activeStone.vx * dt;
          activeStone.y += activeStone.vy * dt;
          activeStone.rotV += activeStone.vx * 0.0008 * dt;
          activeStone.rotV *= 0.98;
          activeStone.rot += activeStone.rotV * dt;

          // Keep within horizontal bounds
          const margin = stoneRadius(activeStone);
          if (activeStone.x < margin) {
            activeStone.x = margin;
            activeStone.vx *= -0.3;
          }
          if (activeStone.x > W - margin) {
            activeStone.x = W - margin;
            activeStone.vx *= -0.3;
          }

          const { restY, supportFound } = findRestingSpot(activeStone);
          const bottomY = stoneBottomY(activeStone);

          if (bottomY >= restY) {
            // Land
            const correction = restY - bottomY;
            activeStone.y += correction;
            settleStone(activeStone, supportFound);
          }
        }
      }

      function settleStone(stone, support) {
        // Compute stability: how centered is this stone over its support / ground
        let stable = true;
        let tiltSeverity = 0;

        if (support) {
          const supportCenterX = support.x;
          const offset = Math.abs(stone.x - supportCenterX);
          const supportR = stoneRadius(support) * 0.7;
          tiltSeverity = offset / supportR;
          stable = tiltSeverity < 1.15;
        }

        // Settle physically (small rest wobble)
        stone.state = "settled";
        stone.settleWobble = stone.rotV * 3;
        stone.rotV = 0;
        stone.vx = 0;
        stone.vy = 0;
        stone.wobbleDecay = 0.92;
        stone.glowT = 1; // freshly placed glow
        stones.push(stone);

        if (!stable && tiltSeverity > 1.4) {
          // Topple! gentle - it slides off and settles on ground nearby, doesn't punish harshly
          setTimeout(() => toppleStone(stone), 300);
          showToast("It leans… and settles elsewhere");
        } else if (!stable) {
          showToast("Wobbly, but it holds");
        } else {
          const messages = [
            "Balanced",
            "Steady now",
            "A quiet rest",
            "Settled gently",
            "Just right",
          ];
          showToast(messages[Math.floor(Math.random() * messages.length)]);
        }

        stoneCountEl.textContent = `${stones.length} stone${stones.length === 1 ? "" : "s"} balanced`;

        // Spawn next stone after a pause
        activeStone = null;
        setTimeout(spawnNewActiveStone, 650);
      }

      function toppleStone(stone) {
        // Remove from stack visually settled, give it a little roll animation off to a side then re-rest on ground
        const idx = stones.indexOf(stone);
        if (idx === -1) return;
        stone.toppling = true;
        stone.vx = (stone.x < W / 2 ? 1 : -1) * 0.6;
        stone.vy = 0.3;
        // let physics settle it again naturally on next frames via a mini simulation
        const fall = () => {
          stone.vy += GRAVITY * 0.6;
          stone.x += stone.vx;
          stone.y += stone.vy;
          stone.rot += stone.vx * 0.02;
          const groundBottom = GROUND_Y();
          if (stoneBottomY(stone) >= groundBottom) {
            stone.y += groundBottom - stoneBottomY(stone);
            stone.toppling = false;
            return;
          }
          requestAnimationFrame(fall);
        };
        fall();
      }

      // Settled stone subtle wobble decay & glow fade
      function updateSettledStones(dt) {
        for (const s of stones) {
          if (s.settleWobble && Math.abs(s.settleWobble) > 0.001) {
            s.rot += s.settleWobble * 0.02 * dt;
            s.settleWobble *= Math.pow(s.wobbleDecay, dt);
          }
          if (s.glowT > 0) s.glowT = Math.max(0, s.glowT - 0.01 * dt);
        }
      }

      // ════════════════════════════════════════════════════════════════
      // DRAWING
      // ════════════════════════════════════════════════════════════════
      function drawBackgroundScene() {
        // Sky gradient already via CSS body bg, but add soft sun + distant hills
        const t = performance.now() * 0.00004;

        // Distant hill silhouette
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(0, H * 0.6);
        ctx.bezierCurveTo(
          W * 0.2,
          H * 0.52,
          W * 0.35,
          H * 0.62,
          W * 0.5,
          H * 0.56,
        );
        ctx.bezierCurveTo(W * 0.7, H * 0.5, W * 0.85, H * 0.6, W, H * 0.55);
        ctx.lineTo(W, H);
        ctx.lineTo(0, H);
        ctx.closePath();
        ctx.fillStyle = "rgba(180,170,150,0.35)";
        ctx.fill();
        ctx.restore();

        // Sun glow
        const sunX = W * 0.78,
          sunY = H * 0.18;
        const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 160);
        sg.addColorStop(0, "rgba(255,240,210,.55)");
        sg.addColorStop(1, "rgba(255,240,210,0)");
        ctx.beginPath();
        ctx.arc(sunX, sunY, 160, 0, Math.PI * 2);
        ctx.fillStyle = sg;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sunX, sunY, 30, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,248,225,.8)";
        ctx.fill();

        // Ground
        const groundGrad = ctx.createLinearGradient(0, GROUND_Y(), 0, H);
        groundGrad.addColorStop(0, "#c8b89c");
        groundGrad.addColorStop(1, "#a89878");
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, GROUND_Y(), W, H - GROUND_Y());

        // Ground texture line
        ctx.strokeStyle = "rgba(120,105,80,.2)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y());
        ctx.lineTo(W, GROUND_Y());
        ctx.stroke();

        // Drifting birds
        drawBirds(t);
      }

      let birds = [
        { x: -50, y: 0.22, speed: 0.15, offset: 0 },
        { x: -150, y: 0.26, speed: 0.12, offset: 1 },
      ];
      function drawBirds(t) {
        ctx.strokeStyle = "rgba(90,80,65,.35)";
        ctx.lineWidth = 1.5;
        for (const b of birds) {
          b.x += b.speed;
          if (b.x > W + 50) b.x = -50;
          const by =
            H * b.y + Math.sin(performance.now() * 0.001 + b.offset) * 6;
          ctx.beginPath();
          ctx.moveTo(b.x - 8, by);
          ctx.quadraticCurveTo(b.x - 3, by - 5, b.x, by);
          ctx.quadraticCurveTo(b.x + 3, by - 5, b.x + 8, by);
          ctx.stroke();
        }
      }

      function drawStonePolygon(stone, extraAlpha = 1) {
        ctx.save();
        ctx.translate(stone.x, stone.y);
        ctx.rotate(stone.rot);

        ctx.beginPath();
        const pts = stone.shape.pts;
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) {
          const mx = (pts[i - 1].x + pts[i].x) / 2;
          const my = (pts[i - 1].y + pts[i].y) / 2;
          ctx.quadraticCurveTo(pts[i - 1].x, pts[i - 1].y, mx, my);
        }
        ctx.closePath();

        const grad = ctx.createLinearGradient(
          0,
          -stone.shape.h / 2,
          0,
          stone.shape.h / 2,
        );
        grad.addColorStop(0, stone.color.top);
        grad.addColorStop(0.5, stone.color.mid);
        grad.addColorStop(1, stone.color.bot);
        ctx.globalAlpha = extraAlpha;
        ctx.fillStyle = grad;
        ctx.fill();

        // Edge shading
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(255,255,255,.15)";
        ctx.stroke();

        // Texture speckles
        ctx.fillStyle = "rgba(0,0,0,.06)";
        for (let i = 0; i < 4; i++) {
          const px = pts[i % pts.length].x * 0.4;
          const py = pts[i % pts.length].y * 0.4;
          ctx.beginPath();
          ctx.arc(px, py, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }

        // Soft highlight
        ctx.beginPath();
        ctx.ellipse(
          -stone.shape.w * 0.15,
          -stone.shape.h * 0.2,
          stone.shape.w * 0.18,
          stone.shape.h * 0.12,
          -0.4,
          0,
          Math.PI * 2,
        );
        ctx.fillStyle = "rgba(255,255,255,.18)";
        ctx.fill();

        ctx.globalAlpha = 1;
        ctx.restore();

        // Placement glow
        if (stone.glowT > 0) {
          ctx.save();
          ctx.globalAlpha = stone.glowT * 0.4;
          ctx.beginPath();
          ctx.ellipse(
            stone.x,
            stone.y,
            stone.shape.w * 0.7,
            stone.shape.h * 0.7,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fillStyle = "rgba(255,250,220,1)";
          ctx.filter = "blur(6px)";
          ctx.fill();
          ctx.filter = "none";
          ctx.restore();
        }
      }

      function drawShadow(stone, groundY) {
        const dropDist = Math.max(0, groundY - stoneBottomY(stone));
        const scale = Math.max(0.3, 1 - dropDist / 300);
        const alpha = Math.max(0.05, 0.22 * scale);
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(
          stone.x,
          GROUND_Y() + 2,
          stone.shape.w * 0.4 * scale,
          7 * scale,
          0,
          0,
          Math.PI * 2,
        );
        ctx.fillStyle = `rgba(60,50,40,${alpha})`;
        ctx.fill();
        ctx.restore();
      }

      // Particles for stone settling
      let dustParticles = [];
      function spawnSettleDust(x, y, w) {
        for (let i = 0; i < 10; i++) {
          const a = Math.PI + Math.random() * Math.PI;
          const v = 0.5 + Math.random() * 1;
          dustParticles.push({
            x: x + (Math.random() - 0.5) * w * 0.6,
            y,
            vx: Math.cos(a) * v,
            vy: Math.sin(a) * v * 0.4 - 0.3,
            life: 1,
            decay: 0.02 + Math.random() * 0.01,
            size: 1.5 + Math.random() * 2,
          });
        }
      }
      function drawDust(dt) {
        for (let i = dustParticles.length - 1; i >= 0; i--) {
          const p = dustParticles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 0.02 * dt;
          p.life -= p.decay * dt;
          if (p.life <= 0) {
            dustParticles.splice(i, 1);
            continue;
          }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(150,130,100,${p.life * 0.5})`;
          ctx.fill();
        }
      }

      // Hook dust spawn into settle
      const origSettle = settleStone;
      settleStone = function (stone, support) {
        spawnSettleDust(stone.x, stoneBottomY(stone), stone.shape.w);
        origSettle(stone, support);
      };

      // ════════════════════════════════════════════════════════════════
      // TOAST
      // ════════════════════════════════════════════════════════════════
      let toastTimer;
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 1900);
      }

      // ════════════════════════════════════════════════════════════════
      // RESET
      // ════════════════════════════════════════════════════════════════
      document.getElementById("reset-btn").addEventListener("click", () => {
        stones = [];
        stoneCountEl.textContent = "0 stones balanced";
        spawnNewActiveStone();
        showToast("A clear space to begin again");
      });

      // ════════════════════════════════════════════════════════════════
      // MAIN LOOP
      // ════════════════════════════════════════════════════════════════
      let lastTs = performance.now();
      function loop(ts) {
        requestAnimationFrame(loop);
        const dt = Math.min((ts - lastTs) / 16.67, 2.5);
        lastTs = ts;

        ctx.clearRect(0, 0, W, H);
        drawBackgroundScene();

        updateSettledStones(dt);
        for (const s of stones) {
          drawShadow(s, GROUND_Y());
        }
        for (const s of stones) {
          drawStonePolygon(s);
        }

        drawDust(dt);

        updateActiveStone(dt);
        if (activeStone) {
          drawShadow(activeStone, GROUND_Y());
          drawStonePolygon(activeStone);
        }
      }

      spawnNewActiveStone();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
